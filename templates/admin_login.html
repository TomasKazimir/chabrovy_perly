{% extends 'base.html' %}
{% block title %}Admin login{% endblock %}
{% block content %}
  <h1>Admin login</h1>
  <form method="post">
    <p>
      <label>
        Username
        <input type="text" name="username" required>
      </label>
    </p>
    <p>
      <label>
        Password
        <input type="password" name="password" required>
      </label>
    </p>
    <button type="submit">Log in</button>
  </form>
{% endblock %}
